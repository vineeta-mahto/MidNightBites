{% extends 'base.html' %}
{% block title %}Add Restaurant - MidNightBites{% endblock %}
{% block content %}
<div class="form-container">
    <h2 class="form-title">Add Restaurant</h2>
    <form action="{% url 'add_restaurant' %}" method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Picture URL</label>
            <input type="url" name="picture" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Cuisine</label>
            <input type="text" name="cuisine" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Rating</label>
            <input type="number" step="0.1" name="rating" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Add Restaurant</button>
    </form>
</div>
{% endblock %}
