{% extends 'base.html' %}
{% block title %}Error - MidNightBites{% endblock %}
{% block content %}
<div class="form-container" style="text-align: center; padding: 4rem 2rem;">
    <div style="width: 100px; height: 100px; background: rgba(255, 71, 87, 0.1); color: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin: 0 auto 2rem;">
        <i class="fa-solid fa-xmark"></i>
    </div>
    <h2 style="font-size: 2rem; margin-bottom: 1rem; color: var(--danger);">Authentication Failed</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Invalid username or password. Please try again.</p>
    <div style="display: flex; gap: 1rem; justify-content: center;">
        <a href="{% url 'open_signin' %}" class="btn btn-primary" style="width: auto;">Try Again</a>
        <a href="{% url 'open_signup' %}" class="btn" style="border: 1px solid var(--primary); color: var(--primary); width: auto;">Create Account</a>
    </div>
</div>
{% endblock %}
